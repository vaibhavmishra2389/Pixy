<!DOCTYPE html>
<html>
<head>
  <title>Pixy Editor</title>
  <style>
    body {
      background: #0F0F14;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 20px;
    }
    img {
      width: 100%;
      margin-top: 20px;
    }
    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Pixy</h1>
<p>Editor by Pixy</p>

<input type="file" id="upload">

<img id="preview">

<div>
  <button onclick="setFilter('brightness(1.2)')">Bright</button>
  <button onclick="setFilter('grayscale(1)')">B&W</button>
  <button onclick="setFilter('sepia(1)')">Vintage</button>
  <button onclick="setFilter('none')">Reset</button>
</div>

<script>
let img = document.getElementById("preview");

document.getElementById("upload").onchange = function(e){
  img.src = URL.createObjectURL(e.target.files[0]);
}

function setFilter(f){
  img.style.filter = f;
}
</script>

</body>
</html>
