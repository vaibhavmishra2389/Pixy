<!DOCTYPE html>
<html>
<head>
  <title>Pixy Editor</title>
  <style>
    body {
      background: #0F0F14;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 20px;
    }
    img {
      width: 100%;
      margin-top: 20px;
    }
    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Pixy</h1>
<p>Editor by Pixy</p>

<input type="file" id="upload">

<img id="preview">

<div>
  <button onclick="setFilter('brightness(1.2)')">Bright</button>
  <button onclick="setFilter('grayscale(1)')">B&W</button>
  <button onclick="setFilter('sepia(1)')">Vintage</button>
  <button onclick="setFilter('none')">Reset</button>
</div>

   <script>
let img = document.getElementById("preview");
let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

document.getElementById("upload").onchange = function(e){
  let file = e.target.files[0];
  img.src = URL.createObjectURL(file);
};

function setFilter(f){
  img.style.filter = f;
}

// Download with filter applied
function downloadImage(){
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.filter = img.style.filter;
  ctx.drawImage(img, 0, 0);

  let link = document.createElement("a");
  link.download = "pixy-image.png";
  link.href = canvas.toDataURL();
  link.click();
}
   </script>  
  <button onclick="downloadImage()">Download</button>
